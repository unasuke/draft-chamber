on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::297776507902:role/PushECRFromGitHubActions
          aws-region: ap-northeast-1

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/unasuke/draft-chamber:${{ github.sha }}
            ghcr.io/unasuke/draft-chamber:latest
            ${{ steps.ecr-login.outputs.registry }}/draft-chamber:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/draft-chamber:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
